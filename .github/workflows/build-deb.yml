name: Build .deb package

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: |
          curl -fsSL https://github.com/tauri-apps/tauri/releases/latest/download/cargo-tauri-x86_64-unknown-linux-gnu.tgz \
            | tar xz -C "$HOME/.cargo/bin"

      - name: Build .deb
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          cargo tauri build --bundles deb --config "{\"version\": \"$VERSION\"}"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: amorist-deb
          path: src-tauri/target/release/bundle/deb/amorist_*.deb

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          DEB="src-tauri/target/release/bundle/deb/amorist_${VERSION}_amd64.deb"
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            gh release upload "v$VERSION" "$DEB" --clobber
          else
            gh release create "v$VERSION" "$DEB" \
              --title "v$VERSION" \
              --notes "See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
