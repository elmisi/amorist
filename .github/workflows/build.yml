name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: deb
            target: ""
            tauri_cli_asset: cargo-tauri-x86_64-unknown-linux-gnu.tgz
            artifact_name: amorist-deb
            artifact_glob: src-tauri/target/release/bundle/deb/amorist_*.deb
          - os: ubuntu-latest
            bundle: appimage
            target: ""
            tauri_cli_asset: cargo-tauri-x86_64-unknown-linux-gnu.tgz
            artifact_name: amorist-appimage
            artifact_glob: src-tauri/target/release/bundle/appimage/amorist_*.AppImage
          - os: macos-latest
            bundle: dmg
            target: universal-apple-darwin
            tauri_cli_asset: cargo-tauri-aarch64-apple-darwin.zip
            artifact_name: amorist-dmg
            artifact_glob: src-tauri/target/universal-apple-darwin/release/bundle/dmg/amorist_*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}-${{ matrix.target }}

      - name: Install Tauri CLI
        run: |
          url="https://github.com/tauri-apps/tauri/releases/latest/download/${{ matrix.tauri_cli_asset }}"
          dest="$HOME/.cargo/bin"
          mkdir -p "$dest"
          case "${{ matrix.tauri_cli_asset }}" in
            *.tgz)
              curl -fsSL "$url" | tar xz -C "$dest"
              ;;
            *.zip)
              tmp=$(mktemp -d)
              curl -fsSL "$url" -o "$tmp/tauri.zip"
              unzip -q -o "$tmp/tauri.zip" -d "$dest"
              chmod +x "$dest/cargo-tauri"
              rm -rf "$tmp"
              ;;
          esac

      - name: Build bundle
        env:
          # GitHub runners lack FUSE; let appimagetool/linuxdeploy run by
          # self-extracting instead of mounting. Harmless for deb/dmg builds.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          if [ -n "${{ matrix.target }}" ]; then
            cargo tauri build --bundles "${{ matrix.bundle }}" --target "${{ matrix.target }}" --config "{\"version\": \"$VERSION\"}"
          else
            cargo tauri build --bundles "${{ matrix.bundle }}" --config "{\"version\": \"$VERSION\"}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          DEB=$(ls dist/amorist-deb/amorist_*.deb)
          DMG=$(ls dist/amorist-dmg/amorist_*.dmg)
          APPIMAGE=$(ls dist/amorist-appimage/amorist_*.AppImage)
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            gh release upload "v$VERSION" "$DEB" "$DMG" "$APPIMAGE" --clobber
          else
            gh release create "v$VERSION" "$DEB" "$DMG" "$APPIMAGE" \
              --title "v$VERSION" \
              --notes "See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
