<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>amorist</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="stylesheet" href="editor/amorist-editor.css" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="identity">
          <strong id="app-name">amorist</strong>
          <span id="app-version" class="app-version"></span>
          <span id="file-name">Loading...</span>
        </div>
        <div class="actions">
          <button id="reload-button" type="button">Reload</button>
          <button id="save-button" type="button">Save</button>
        </div>
      </header>

      <section id="notice" class="notice" hidden></section>
      <section id="editor" class="editor"></section>

      <footer class="statusbar">
        <span id="status">Starting</span>
        <span id="file-path"></span>
      </footer>
    </main>

    <script src="editor/amorist-text-utils.js"></script>
    <script src="editor/amorist-table-codec.js"></script>
    <script src="editor/amorist-markdown-codec.js"></script>
    <script src="editor/amorist-html-to-markdown.js"></script>
    <script src="editor/amorist-editing-policy.js"></script>
    <script src="editor/amorist-editor.js"></script>
    <script src="app.js"></script>
  </body>
</html>
